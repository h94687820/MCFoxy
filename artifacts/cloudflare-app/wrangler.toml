name = "minecraft-hub"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Static frontend build output (built by `pnpm --filter @workspace/minecraft-hub run build`)
[assets]
directory = "../minecraft-hub/dist/public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Non-secret vars. Secrets (CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY,
# DATABASE_URL, SUPABASE_SERVICE_ROLE_KEY, DEEPAI_API_KEY, VIRUSTOTAL_API_KEY)
# are set via `wrangler secret put <NAME>` and must NOT be committed here.
# SUPABASE_URL is not a secret and can be committed.
[vars]
NODE_ENV = "production"
SUPABASE_URL = "https://ofaucvabdfaknojoaivq.supabase.co"
