<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" fill="#e8e8e8"/>
  <!-- Fox head base -->
  <rect x="6" y="12" width="28" height="22" fill="#f5f5f5"/>
  <!-- Left ear -->
  <rect x="6" y="4" width="10" height="14" fill="#f5f5f5"/>
  <!-- Right ear -->
  <rect x="24" y="4" width="10" height="14" fill="#f5f5f5"/>
  <!-- Ear tips orange -->
  <rect x="7" y="5" width="7" height="8" fill="#e8721a"/>
  <rect x="26" y="5" width="7" height="8" fill="#e8721a"/>
  <!-- Gray top of head -->
  <rect x="13" y="12" width="14" height="5" fill="#bbbbbb"/>
  <!-- Left eye -->
  <rect x="10" y="19" width="6" height="6" fill="#1a1a1a"/>
  <rect x="11" y="20" width="2" height="2" fill="#ffffff"/>
  <!-- Right eye -->
  <rect x="24" y="19" width="6" height="6" fill="#1a1a1a"/>
  <rect x="25" y="20" width="2" height="2" fill="#ffffff"/>
  <!-- Nose -->
  <rect x="18" y="26" width="4" height="3" fill="#1a1a1a"/>
  <!-- Cheeks white -->
  <rect x="8" y="24" width="7" height="6" fill="#ffffff"/>
  <rect x="25" y="24" width="7" height="6" fill="#ffffff"/>
</svg>
