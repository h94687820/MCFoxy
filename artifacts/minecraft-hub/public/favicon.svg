<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1a1a2e"/>

  <!-- Tail (behind body, side view) -->
  <rect x="18" y="80" width="44" height="36" fill="#f0f0f0"/>
  <!-- Tail tip (orange) -->
  <rect x="18" y="80" width="22" height="18" fill="#e8721a"/>
  <!-- Tail shading -->
  <rect x="18" y="98" width="44" height="8" fill="#d0d0d0"/>

  <!-- Body -->
  <rect x="54" y="84" width="72" height="52" fill="#f5f5f5"/>
  <!-- Body underside shading -->
  <rect x="54" y="118" width="72" height="18" fill="#e0e0e0"/>

  <!-- Back leg -->
  <rect x="60" y="132" width="20" height="24" fill="#e0e0e0"/>
  <!-- Front leg -->
  <rect x="96" y="132" width="20" height="24" fill="#e0e0e0"/>
  <!-- Leg bottoms (feet) -->
  <rect x="58" y="152" width="24" height="8" fill="#cccccc"/>
  <rect x="94" y="152" width="24" height="8" fill="#cccccc"/>

  <!-- Head -->
  <rect x="100" y="44" width="60" height="54" fill="#f5f5f5"/>
  <!-- Head top shading -->
  <rect x="100" y="44" width="60" height="12" fill="#e8e8e8"/>

  <!-- Ear (back) -->
  <rect x="108" y="24" width="18" height="28" fill="#f0f0f0"/>
  <rect x="112" y="26" width="10" height="18" fill="#e8721a"/>

  <!-- Ear (front) -->
  <rect x="136" y="24" width="18" height="28" fill="#f0f0f0"/>
  <rect x="140" y="26" width="10" height="18" fill="#e8721a"/>

  <!-- Eye (black) -->
  <rect x="144" y="60" width="12" height="12" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <rect x="146" y="62" width="4" height="4" fill="#ffffff"/>

  <!-- Nose -->
  <rect x="154" y="78" width="8" height="6" fill="#1a1a1a"/>

  <!-- Muzzle (slightly lighter) -->
  <rect x="148" y="72" width="20" height="20" fill="#ececec"/>
  <rect x="154" y="78" width="8" height="6" fill="#1a1a1a"/>

  <!-- Neck connection -->
  <rect x="108" y="94" width="46" height="14" fill="#f0f0f0"/>
</svg>
