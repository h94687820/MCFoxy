<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#e8e8e8"/>
  <!-- Fox head base (white) -->
  <rect x="30" y="50" width="120" height="100" fill="#f5f5f5"/>
  <!-- Left ear -->
  <rect x="30" y="20" width="40" height="50" fill="#f5f5f5"/>
  <!-- Right ear -->
  <rect x="110" y="20" width="40" height="50" fill="#f5f5f5"/>
  <!-- Left ear inner (orange tip) -->
  <rect x="38" y="22" width="24" height="30" fill="#e8721a"/>
  <!-- Right ear inner (orange tip) -->
  <rect x="118" y="22" width="24" height="30" fill="#e8721a"/>
  <!-- Left eye -->
  <rect x="52" y="78" width="22" height="22" fill="#1a1a1a"/>
  <rect x="56" y="82" width="8" height="8" fill="#ffffff"/>
  <!-- Right eye -->
  <rect x="106" y="78" width="22" height="22" fill="#1a1a1a"/>
  <rect x="110" y="82" width="8" height="8" fill="#ffffff"/>
  <!-- Nose -->
  <rect x="82" y="108" width="16" height="12" fill="#1a1a1a"/>
  <!-- Mouth -->
  <rect x="74" y="120" width="12" height="8" fill="#1a1a1a"/>
  <rect x="94" y="120" width="12" height="8" fill="#1a1a1a"/>
  <!-- Cheeks (lighter white patches) -->
  <rect x="40" y="100" width="30" height="28" fill="#ffffff"/>
  <rect x="110" y="100" width="30" height="28" fill="#ffffff"/>
  <!-- Gray patches on top of head -->
  <rect x="60" y="50" width="60" height="20" fill="#cccccc"/>
</svg>
