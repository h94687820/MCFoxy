openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Minecraft Mods & Maps Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: files
    description: Mod and map file operations
  - name: settings
    description: User settings
  - name: Auth
    description: Browser and mobile authentication endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List all uploaded files
      parameters:
        - name: edition
          in: query
          required: false
          schema:
            type: string
            enum: [java, bedrock]
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [mod, map]
        - name: scanStatus
          in: query
          required: false
          schema:
            type: string
            enum: [pending, scanning, clean, malicious, error]
      responses:
        "200":
          description: List of uploaded files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedFile"

  /files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedFile"
        "404":
          description: Not found

    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized

  /files/{id}/scan:
    post:
      operationId: scanFile
      tags: [files]
      summary: Trigger VirusTotal scan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedFile"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /files/{id}/download:
    get:
      operationId: downloadFile
      tags: [files]
      summary: Download a file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /files/stats:
    get:
      operationId: getFileStats
      tags: [files]
      summary: Get file upload statistics
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStats"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UploadedFile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        originalName:
          type: string
        edition:
          type: string
          enum: [java, bedrock]
        type:
          type: string
          enum: [mod, map]
        size:
          type: integer
        mimeType:
          type: ["string", "null"]
        uploadedAt:
          type: string
        scanStatus:
          type: string
          enum: [pending, scanning, clean, malicious, error]
        scanDetails:
          type: ["string", "null"]
        scanEngine:
          type: ["string", "null"]
        virusTotalLink:
          type: ["string", "null"]
        detectionRatio:
          type: ["string", "null"]
      required:
        - id
        - name
        - originalName
        - edition
        - type
        - size
        - uploadedAt
        - scanStatus

    FileStats:
      type: object
      properties:
        totalFiles:
          type: integer
        totalMods:
          type: integer
        totalMaps:
          type: integer
        javaMods:
          type: integer
        javaMaps:
          type: integer
        bedrockMods:
          type: integer
        bedrockMaps:
          type: integer
        cleanFiles:
          type: integer
        maliciousFiles:
          type: integer
        pendingFiles:
          type: integer
        totalSizeBytes:
          type: integer
      required:
        - totalFiles
        - totalMods
        - totalMaps
        - javaMods
        - javaMaps
        - bedrockMods
        - bedrockMaps
        - cleanFiles
        - maliciousFiles
        - pendingFiles
        - totalSizeBytes

    Settings:
      type: object
      properties:
        id:
          type: integer
        theme:
          type: string
          enum: [creeper, nether, ocean, end, sky, default]
        darkMode:
          type: boolean
        virusTotalEnabled:
          type: boolean
      required:
        - id
        - theme
        - darkMode
        - virusTotalEnabled

    SettingsInput:
      type: object
      properties:
        theme:
          type: string
          enum: [creeper, nether, ocean, end, sky, default]
        darkMode:
          type: boolean
        virusTotalEnabled:
          type: boolean
